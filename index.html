<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Panther · Bang for the Buck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Civic Modern tokens — mirrored from gp-portal tokens.jsx
     If a value moves there, move it here. Never patch downstream. */
  :root {
    /* Color: surfaces */
    --bg: #FFFFFF;
    --paper: #FAFAF8;
    --surfaceHi: #F4F3EF;

    /* Color: lines */
    --hair: #E8E6E0;
    --strong: #D6D3CC;

    /* Color: text */
    --text: #111113;
    --body: #3A3A3D;
    --muted: #6B6B70;
    --dim: #9A9A9E;

    /* Color: action — RESERVED for the one CTA / focus ring */
    --action: #D63600;
    --action-hi: #B02C00;
    --action-soft: #FFF1EC;

    /* Color: status (passive only) */
    --err: #B42318;

    /* Type */
    --font-sans: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;

    /* Radius */
    --r-xs: 4px;
    --r-md: 8px;

    /* Spacing (reference; Tailwind handles emit) */
  }

  html, body, #root { background: var(--bg); color: var(--text); font-family: var(--font-sans); }
  body { font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* Atoms — CSS for components that aren't trivially Tailwindable */

  .micro {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .id-chip {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  .hair { background: var(--hair); height: 1px; width: 100%; }

  .field-label { font-size: 16px; font-weight: 500; color: var(--text); display: block; margin-bottom: 8px; }
  .field-help { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .field-err { font-size: 14px; color: var(--err); margin-top: 6px; }

  .control {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--strong);
    border-radius: var(--r-xs);
    padding: 12px 16px;
    transition: border-color 150ms ease-out, box-shadow 150ms ease-out;
    min-height: 44px;
  }
  .control:hover:not(:focus) { border-color: var(--text); }
  .control:focus { outline: none; border-color: var(--action); box-shadow: 0 0 0 1px var(--action); }
  .control[aria-invalid="true"] { border-width: 2px; border-color: var(--err); padding: 11px 15px; }
  .control[aria-invalid="true"]:focus { box-shadow: 0 0 0 1px var(--err); }
  select.control { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%236B6B70'><path d='M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.25 4.39a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; background-size: 16px; padding-right: 44px; }

  .btn {
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
    border-radius: var(--r-xs);
    padding: 14px 22px;
    min-height: 44px;
    cursor: pointer;
    transition: background 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out;
  }
  .btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--action); }
  .btn-primary { background: var(--action); color: #fff; border: 1px solid var(--action); }
  .btn-primary:hover:not(:disabled) { background: var(--action-hi); border-color: var(--action-hi); }
  .btn-primary:disabled { background: var(--strong); border-color: var(--strong); cursor: not-allowed; }
  .btn-tertiary { background: transparent; color: var(--muted); border: 1px solid transparent; padding: 14px 12px; }
  .btn-tertiary:hover { color: var(--text); }

  .card {
    background: var(--bg);
    border: 1px solid var(--hair);
    border-radius: var(--r-md);
    padding: 20px;
    transition: border-color 150ms ease-out, background 150ms ease-out;
  }
  .card:hover { border-color: var(--strong); }
  .card[data-picked="true"] { border-color: var(--text); background: var(--paper); }
  .card[data-disabled="true"] { opacity: 0.45; }
  .card[data-disabled="true"]:hover { border-color: var(--hair); }

  .pill {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-sans);
    background: var(--surfaceHi);
    color: var(--body);
  }
  .pill[data-tone="picked"] { background: var(--text); color: #fff; }

  .learn-more {
    background: none;
    border: none;
    padding: 0;
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--action);
    cursor: pointer;
    min-height: 32px;
  }
  .learn-more:hover { color: var(--action-hi); }
  .learn-more:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--action); border-radius: 2px; }

  .why-block { border-top: 1px solid var(--hair); padding-top: 16px; margin-top: 16px; }

  /* Display sizes — Civic Modern scale */
  .t-h1 { font-size: 40px; line-height: 1.2; font-weight: 500; letter-spacing: -0.04em; color: var(--text); }
  .t-h3 { font-size: 24px; line-height: 1.3; font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
  .t-h4 { font-size: 18px; line-height: 1.4; font-weight: 500; color: var(--text); }
  .t-body { font-size: 16px; line-height: 1.5; color: var(--body); }
  .t-bodySm { font-size: 14px; line-height: 1.5; color: var(--body); }
  .t-caption { font-size: 12px; line-height: 1.4; color: var(--muted); }

  .price-num { font-family: var(--font-mono); font-weight: 500; font-size: 18px; color: var(--text); letter-spacing: -0.01em; }
  .price-num-lg { font-family: var(--font-mono); font-weight: 500; font-size: 32px; color: var(--text); letter-spacing: -0.02em; }

  .sticky-bar { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--hair); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { html, render, useState, useMemo } from 'https://esm.sh/htm/preact/standalone';

// === CONFIG ===========================================================
const ENDPOINT = "https://script.google.com/macros/s/AKfycbyUSXtmX3vlPu5dOcjRhOux3MPwJp21MnCirIOoJvbg3OoVqELAgm_l8YygnqTxl-UbSg/exec";
const BUDGET = 100;
// =====================================================================

const BETS = [
  {
    id: "B04",
    name: "What shipped today, in plain English",
    price: 15,
    desc: "Claude posts a daily summary of what shipped that day to a Slack channel, in words that aren't commit messages. Fun, light, readable.",
    impact: [
      { role: "If you do CS or support", text: "You know what fixes shipped without asking. Faster, more accurate customer responses." },
      { role: "If you do marketing or sales", text: "You see stories to pull forward without having to interrogate engineering. Release stories are easier to write." },
      { role: "If you do engineering", text: "Your work becomes visible to the rest of the org. Morale loop tightens when shipping gets noticed." },
    ],
  },
  {
    id: "B05",
    name: "Mine customer calls for bugs and feature requests",
    price: 35,
    desc: "Claude listens to every Gong CS call nightly, pulls out anything that sounds like a bug or a feature request, double checks with the CSM, then files it in Jira.",
    impact: [
      { role: "If you do CS", text: "You stop having to remember every passing comment from a call. The system catches them and asks you to confirm. Customers feel heard." },
      { role: "If you do product or engineering", text: "You get a steady stream of validated customer signal instead of having to chase it. Prioritization gets sharper." },
      { role: "If you're a customer", text: "The gap between mentioning something on a call and engineering knowing about it shrinks from weeks to one day." },
    ],
  },
  {
    id: "B07",
    name: "Release notes that actually ship",
    price: 15,
    desc: "Hedgerow already proved the workflow: engineers feed input, Claude drafts the notes, Millie reviews and edits, notes get published. We extend the same playbook to GovPilot and SDL Connect.",
    impact: [
      { role: "If you do sales", text: "Real talking points for every release. No more 'I think we shipped that?'" },
      { role: "If you do CS", text: "Notes you can point a customer at when they ask what's new. Customers see steady forward motion." },
      { role: "If you do marketing", text: "Consistent content stream. Each release becomes pullable for blog, email, or social." },
    ],
  },
  {
    id: "B08",
    name: "A living ICP, with citations",
    price: 35,
    desc: "Claude builds and maintains our Ideal Customer Profile by pulling from Gong calls and other sources, citing every claim, refreshed on a cadence. Replaces the static deck that's already out of date.",
    impact: [
      { role: "If you do sales", text: "You target the right buyers because the profile actually reflects who's buying right now, not who was buying 18 months ago." },
      { role: "If you do marketing", text: "Messaging stays calibrated to the real customer. Every claim is traceable to a source you can quote." },
      { role: "If you do product", text: "You build for the customer we have, not the customer we used to talk about. Roadmap conversations get sharper." },
    ],
  },
  {
    id: "B09",
    name: "Let AI generate large parts of our code",
    price: 40,
    desc: "We give Claude a spec and let it generate big chunks of our codebase. We use it to ship faster when we pick up a new framework or rebuild an aging service.",
    impact: [
      { role: "If you do product", text: "Pivoting to new tech stops being a one-year project. New ideas can be tried at a fraction of the cost." },
      { role: "If you do sales or CS", text: "Faster delivery of customer-requested capabilities. Things that used to take a quarter take weeks." },
      { role: "If you do engineering", text: "You spend more time on the interesting 20% (architecture, edge cases, review) and less on the rote 80%." },
    ],
  },
  {
    id: "B11",
    name: "Catch bugs from the error logs",
    price: 20,
    desc: "Claude scans Sentry error logs nightly to find bugs that didn't get caught by developers or QA. Surfaces what's actually breaking in the wild.",
    impact: [
      { role: "If you do CS or support", text: "Fewer mystery bugs that customers find before we do. Issues get fixed before they become tickets." },
      { role: "If you do QA", text: "Less time hunting for what's broken. More time verifying fixes." },
      { role: "If you're a customer", text: "More stable product. Things that would have silently failed get caught and fixed." },
    ],
  },
  {
    id: "B13",
    name: "Done means done. Customer hears about it",
    price: 25,
    desc: "When an engineer marks a ticket Done, it auto-posts to a Slack channel, tags whoever reported the bug, looks up the customer in HubSpot, and pings the CSM so they can tell the customer.",
    impact: [
      { role: "If you do CS", text: "You always know which of your customer's issues got resolved. You're never the last to know. You always have a 'win' to send." },
      { role: "If you do support", text: "Your tickets close visibly. The customer hears back without you chasing engineering." },
      { role: "If you do engineering", text: "Marking Done becomes a public commitment. People only do it when something is actually shipped and working." },
    ],
  },
  {
    id: "B14",
    name: "Plan one month at a time",
    price: 20,
    desc: "Each team publishes a one-month roadmap instead of a quarter. Leadership reviews what shipped at month end, then sets the next month from there. Anthropic moved to this. Quarterly artifacts retire.",
    impact: [
      { role: "If you do product or PM", text: "Less time on quarterly roadmap theater. More time on what's actually next." },
      { role: "If you do sales or CS", text: "A more reliable 30-day view of what's coming. Easier to set customer expectations honestly." },
      { role: "If you do engineering", text: "You stop overcommitting to work three months out that you couldn't have predicted today." },
    ],
  },
  {
    id: "B16",
    name: "Support to engineering bug pipeline",
    price: 25,
    desc: "Each week, Claude cross-references support tickets in HubSpot against bugs in Jira by category and volume. Engineering prioritizes by actual customer impact, not by whoever lobbies the loudest.",
    impact: [
      { role: "If you do support", text: "Your tickets translate into engineering action you can see. No more black hole." },
      { role: "If you do engineering or product", text: "Real prioritization signal. The bug that's hitting 30 customers gets ranked above the one hitting one loud customer." },
      { role: "If you're a CSM", text: "Recurring customer pain finally gets weight without you having to escalate." },
    ],
  },
  {
    id: "B17",
    name: "Coaching briefs, not coaching spreadsheets",
    price: 25,
    desc: "Each week, Claude generates a coaching brief for each support agent: escalation rate, case aging, write-up quality, stage hygiene. Managers walk into 1:1s with the data ready.",
    impact: [
      { role: "If you do support", text: "Faster feedback loops. You know where you stand without your manager having to compile a spreadsheet." },
      { role: "If you manage support", text: "You spend coaching time on the conversation, not the prep. You walk in already informed." },
      { role: "If you're a customer", text: "Better-trained agents. Faster resolution. Cleaner handoffs." },
    ],
  },
];

// === Atoms ============================================================

const Field = ({ label, help, error, htmlFor, children }) => html`
  <div>
    <label class="field-label" for=${htmlFor}>${label}</label>
    ${children}
    ${help && !error && html`<div class="field-help">${help}</div>`}
    ${error && html`<div class="field-err">${error}</div>`}
  </div>
`;

const Input = ({ id, value, onInput, placeholder, invalid }) => html`
  <input
    id=${id}
    class="control"
    type="text"
    value=${value}
    onInput=${onInput}
    placeholder=${placeholder}
    aria-invalid=${invalid ? "true" : "false"}
  />
`;

const Select = ({ id, value, onChange, options, invalid }) => html`
  <select
    id=${id}
    class="control"
    value=${value}
    onChange=${onChange}
    aria-invalid=${invalid ? "true" : "false"}
  >
    ${options.map(o => html`<option key=${o.value} value=${o.value}>${o.label}</option>`)}
  </select>
`;

const Textarea = ({ id, value, onInput, placeholder, rows = 3 }) => html`
  <textarea
    id=${id}
    class="control"
    rows=${rows}
    value=${value}
    onInput=${onInput}
    placeholder=${placeholder}
  ></textarea>
`;

const Button = ({ type = "button", variant = "primary", onClick, disabled, children }) => html`
  <button type=${type} class=${`btn btn-${variant}`} onClick=${onClick} disabled=${disabled}>
    ${children}
  </button>
`;

const Pill = ({ tone = "default", children }) => html`
  <span class="pill" data-tone=${tone}>${children}</span>
`;

// === Molecule =========================================================

const BetCard = ({ bet, picked, tooExpensive, isOpen, onToggle, onToggleExpand }) => html`
  <li
    class="card"
    data-picked=${picked ? "true" : "false"}
    data-disabled=${tooExpensive ? "true" : "false"}
  >
    <div
      class=${`flex items-start justify-between gap-4 ${tooExpensive ? "cursor-not-allowed" : "cursor-pointer"}`}
      onClick=${() => !tooExpensive && onToggle()}
      role="button"
      aria-pressed=${picked}
      aria-disabled=${tooExpensive}
    >
      <div class="flex-1">
        <div class="flex items-center gap-3 mb-2">
          <span class="id-chip">${bet.id}</span>
          <span class="t-h4">${bet.name}</span>
        </div>
        <p class="t-bodySm">${bet.desc}</p>
      </div>
      <div class="text-right shrink-0 flex flex-col items-end gap-2">
        <div class="price-num">$${bet.price}</div>
        <${Pill} tone=${picked ? "picked" : "default"}>
          ${picked ? "Picked" : tooExpensive ? "Over budget" : "Tap to pick"}
        <//>
      </div>
    </div>

    <button
      type="button"
      class="learn-more"
      onClick=${(e) => { e.stopPropagation(); onToggleExpand(); }}
      aria-expanded=${isOpen}
    >
      ${isOpen ? "Hide details" : "Learn more"}
    </button>

    ${isOpen && html`
      <div class="why-block">
        <div class="micro" style=${{ marginBottom: '12px' }}>Why this matters to you</div>
        <ul class="space-y-3">
          ${bet.impact.map(im => html`
            <li>
              <div class="t-bodySm" style=${{ color: 'var(--text)', fontWeight: 500 }}>${im.role}</div>
              <div class="t-bodySm">${im.text}</div>
            </li>
          `)}
        </ul>
      </div>
    `}
  </li>
`;

// === Screen ===========================================================

function PantherVote() {
  const [step, setStep] = useState("identify");
  const [name, setName] = useState("");
  const [team, setTeam] = useState("");
  const [picks, setPicks] = useState(() => new Set());
  const [expanded, setExpanded] = useState(() => new Set());
  const [note, setNote] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState("");

  const spent = useMemo(
    () => BETS.filter(b => picks.has(b.id)).reduce((s, b) => s + b.price, 0),
    [picks]
  );
  const remaining = BUDGET - spent;

  function toggle(bet) {
    const next = new Set(picks);
    if (next.has(bet.id)) {
      next.delete(bet.id);
    } else {
      if (spent + bet.price > BUDGET) return;
      next.add(bet.id);
    }
    setPicks(next);
  }

  function toggleExpand(id) {
    const next = new Set(expanded);
    if (next.has(id)) next.delete(id); else next.add(id);
    setExpanded(next);
  }

  async function submit() {
    setError("");
    if (!name.trim() || !team.trim()) { setError("Add your name and team to submit."); return; }
    if (picks.size === 0) { setError("Pick at least one bet."); return; }
    setSubmitting(true);
    const payload = {
      voter: name.trim(),
      team: team.trim(),
      picks: BETS.filter(b => picks.has(b.id)).map(b => ({ id: b.id, name: b.name, price: b.price })),
      spent,
      note: note.trim(),
      submitted_at: new Date().toISOString(),
    };
    try {
      await fetch(ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      setSubmitted(true);
    } catch (e) {
      setError("Couldn't submit. Try again, or screenshot your picks and send them to Sam.");
    } finally {
      setSubmitting(false);
    }
  }

  if (submitted) {
    return html`
      <div class="max-w-2xl mx-auto px-6 py-24">
        <div class="micro" style=${{ marginBottom: '12px' }}>Vote in</div>
        <h1 class="t-h1" style=${{ marginBottom: '24px' }}>Thanks, ${name.split(" ")[0]}.</h1>
        <div class="hair" style=${{ marginBottom: '24px' }}></div>
        <p class="t-body" style=${{ marginBottom: '8px' }}>Your picks are logged. Sam has them.</p>
        <p class="t-bodySm" style=${{ color: 'var(--muted)' }}>You spent $${spent} of $${BUDGET} on ${picks.size} bet${picks.size === 1 ? "" : "s"}.</p>
      </div>
    `;
  }

  return html`
    <div class="max-w-3xl mx-auto px-6 py-16">
      <header class="mb-8">
        <div class="micro" style=${{ marginBottom: '12px' }}>Panther</div>
        <h1 class="t-h1" style=${{ marginBottom: '16px' }}>Bang for the Buck</h1>
        <p class="t-body" style=${{ maxWidth: '34rem' }}>
          You have <span class="price-num">$${BUDGET}</span> to spend on the team's bets.
          Each bet is priced by the effort to ship it. Pick the ones you'd actually fund.
        </p>
        <p class="t-bodySm" style=${{ maxWidth: '34rem', marginTop: '12px', color: 'var(--muted)' }}>
          Sam will see who voted. How you voted stays between you and him.
        </p>
      </header>

      <div class="hair" style=${{ marginBottom: '32px' }}></div>

      ${step === "identify" && html`
        <section>
          <div class="micro" style=${{ marginBottom: '20px' }}>Who's voting</div>
          <div class="space-y-5" style=${{ marginBottom: '32px' }}>
            <${Field} label="Your name" htmlFor="voter-name">
              <${Input} id="voter-name" value=${name} onInput=${e => setName(e.target.value)} />
            <//>
            <${Field} label="Team you spend the most time on" htmlFor="voter-team">
              <${Select}
                id="voter-team"
                value=${team}
                onChange=${e => setTeam(e.target.value)}
                options=${[
                  { value: "", label: "Pick one" },
                  { value: "GovPilot", label: "GovPilot" },
                  { value: "SDL", label: "SDL" },
                  { value: "Hedgerow", label: "Hedgerow" },
                  { value: "Cross-functional", label: "Cross-functional" },
                  { value: "Other", label: "Other" },
                ]}
              />
            <//>
          </div>
          <${Button} onClick=${() => setStep("vote")} disabled=${!name.trim() || !team.trim()}>
            Start voting
          <//>
        </section>
      `}

      ${step === "vote" && html`
        <section>
          <div class="sticky-bar -mx-6 px-6 py-4 mb-6 flex items-baseline justify-between">
            <div>
              <div class="micro" style=${{ marginBottom: '4px' }}>Remaining</div>
              <div class="price-num-lg">$${remaining}</div>
            </div>
            <div class="t-bodySm" style=${{ color: 'var(--muted)' }}>
              ${picks.size} bet${picks.size === 1 ? "" : "s"} · $${spent} spent
            </div>
          </div>

          <ul class="space-y-3" style=${{ marginBottom: '32px' }}>
            ${BETS.map(b => html`
              <${BetCard}
                key=${b.id}
                bet=${b}
                picked=${picks.has(b.id)}
                tooExpensive=${!picks.has(b.id) && b.price > remaining}
                isOpen=${expanded.has(b.id)}
                onToggle=${() => toggle(b)}
                onToggleExpand=${() => toggleExpand(b.id)}
              />
            `)}
          </ul>

          <div style=${{ marginBottom: '24px' }}>
            <${Field}
              label="Anything to add"
              help="Why these bets, what's missing, what you'd push back on. Optional."
              htmlFor="voter-note"
            >
              <${Textarea}
                id="voter-note"
                value=${note}
                onInput=${e => setNote(e.target.value)}
                rows=${3}
              />
            <//>
          </div>

          ${error && html`<div class="field-err" style=${{ marginBottom: '16px' }}>${error}</div>`}

          <div class="flex items-center gap-2">
            <${Button} onClick=${submit} disabled=${submitting || picks.size === 0}>
              ${submitting ? "Submitting…" : "Submit vote"}
            <//>
            <${Button} variant="tertiary" onClick=${() => setStep("identify")}>
              Back
            <//>
          </div>
        </section>
      `}

      <footer style=${{ marginTop: '80px', paddingTop: '24px', borderTop: '1px solid var(--hair)' }}>
        <div class="t-caption">Panther · Bang for the Buck · One vote per person.</div>
      </footer>
    </div>
  `;
}

render(html`<${PantherVote} />`, document.getElementById('root'));
</script>
</body>
</html>
